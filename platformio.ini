; ===================================================
; PlatformIO — ryan_bot / mech_bot
;
; Three environments, one per board:
;   master  — LilyGO T-Display S3 #1 (master controller)
;   slave   — LilyGO T-Display S3 #2 (slave / motor driver)
;   motion  — Cytron MOTION 2350 Pro  (servos + music)
;
; Both T-Display boards compile the SAME source (src/tdisplay/main.cpp).
; Role and peer MAC are injected as build flags — no source edits needed
; when swapping boards. Just update the MACs here.
;
; UPLOAD NOTES — T-Display S3 (native USB, no UART chip):
;   To enter DFU: hold BOOT, tap RESET, release BOOT.
;   Set upload_port / monitor_port here if auto-detect fails.
;
; UPLOAD NOTES — MOTION 2350 Pro (RP2350):
;   Hold BOOTSEL, plug USB-C → board mounts as a drive.
; ===================================================

[platformio]
default_envs = master, slave, motion

; ─── Shared base for both T-Display S3 boards ──────────────────────────
[esp32s3_common]
platform          = espressif32
framework         = arduino
board             = esp32s3box
board_build.mcu              = esp32s3
board_build.f_cpu            = 240000000L
board_build.flash_size       = 16MB
board_build.flash_mode       = qio
board_build.arduino.memory_type = qio_opi
upload_speed   = 921600
monitor_speed  = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43

; ─── Master — T-Display S3 #1 ──────────────────────────────────────────
; Self MAC:  30:30:F9:59:31:78
; Peer MAC:  30:30:F9:59:CE:E4  (slave)
[env:master]
extends   = esp32s3_common
src_dir   = src/tdisplay
build_flags =
    ${esp32s3_common.build_flags}
    -DIS_MASTER
    -DPEER_MAC_0=0x30
    -DPEER_MAC_1=0x30
    -DPEER_MAC_2=0xF9
    -DPEER_MAC_3=0x59
    -DPEER_MAC_4=0xCE
    -DPEER_MAC_5=0xE4

; ─── Slave — T-Display S3 #2 ───────────────────────────────────────────
; Self MAC:  30:30:F9:59:CE:E4
; Peer MAC:  30:30:F9:59:31:78  (master)
[env:slave]
extends   = esp32s3_common
src_dir   = src/tdisplay
build_flags =
    ${esp32s3_common.build_flags}
    -DIS_SLAVE
    -DPEER_MAC_0=0x30
    -DPEER_MAC_1=0x30
    -DPEER_MAC_2=0xF9
    -DPEER_MAC_3=0x59
    -DPEER_MAC_4=0x31
    -DPEER_MAC_5=0x78

; ─── Cytron MOTION 2350 Pro (RP2350) ───────────────────────────────────
[env:motion]
platform            = https://github.com/maxgerhardt/platform-raspberrypi.git
board               = rpipico2
framework           = arduino
board_build.core    = earlephilhower
monitor_speed       = 115200
src_dir             = src/motion
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.3
